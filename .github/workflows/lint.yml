name: Lint Dev Container Templates

permissions: {}

on:
  pull_request:
    paths:
      - 'src/**'
      - '.github/workflows/lint.yml'
  workflow_dispatch:

jobs:
  description-length:
    runs-on: ubuntu-slim
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Check description length (max 80 chars)
        run: |
          failed=0
          while IFS= read -r file; do
            desc=$(jq -r '.description' "$file")
            len=${#desc}
            if [[ $len -gt 80 ]]; then
              echo "FAIL ($len chars): $file"
              echo "  $desc"
              failed=1
            fi
          done < <(find src -name devcontainer-template.json | sort)
          exit $failed
