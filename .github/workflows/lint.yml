name: Lint Dev Container Templates

permissions: {}

on:
  pull_request:
    paths:
      - 'src/**'
      - '.decolint.jsonc'
      - '.github/workflows/lint.yml'
  workflow_dispatch:

jobs:
  description-length:
    runs-on: ubuntu-slim
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Check description length (max 80 chars)
        run: |
          failed=0
          while IFS= read -r file; do
            desc=$(jq -r '.description' "$file")
            len=${#desc}
            if [[ $len -gt 80 ]]; then
              echo "FAIL ($len chars): $file"
              echo "  $desc"
              failed=1
            fi
          done < <(find src -name devcontainer-template.json | sort)
          exit $failed

  decolint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    env:
      # renovate: datasource=docker depName=ghcr.io/bare-devcontainer/decolint
      DECOLINT_IMAGE: "ghcr.io/bare-devcontainer/decolint:0.1.0@sha256:a859336041a89538f4cdd1d5887751ab03a46e448169e35bd0fe80d6097aa5d7"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run decolint on each template
        run: |
          failed=0
          for dir in src/*/; do
            echo "::group::decolint ${dir}"
            docker run --rm -v "${PWD}:/workspace" -w /workspace \
              "${DECOLINT_IMAGE}" --format=github "${dir}" || failed=1
            echo "::endgroup::"
          done
          exit "${failed}"
