name: "Release Dev Container Templates & Generate Documentation"

permissions: {}

on:
  pull_request:
    paths:
      - '.github/workflows/release.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      packages: write
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: "Publish Templates"
        uses: devcontainers/action@1082abd5d2bf3a11abccba70eef98df068277772 # v1.4.3
        with:
          publish-templates: "${{ github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main' }}"
          base-path-to-templates: "./src"
          generate-docs: "true"
          # renovate: datasource=npm depName=@devcontainers/cli
          devcontainer-cli-version: "0.88.0"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate GitHub App Token
        id: app-token
        if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main'
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.HOUSEKEEPER_CLIENT_ID }}
          private-key: ${{ secrets.HOUSEKEEPER_PRIVATE_KEY }}

      - name: Create PR for Documentation
        if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main'
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -e

          changed=$(git status --porcelain -- 'src/*/README.md' | awk '{print $2}')
          if [ -z "$changed" ]; then
            echo "No documentation changes."
            exit 0
          fi

          OWNER="${GITHUB_REPOSITORY_OWNER}"
          REPO="${GITHUB_REPOSITORY#*/}"
          BRANCH="housekeeper/doc-update-${GITHUB_RUN_ID}"
          MESSAGE="docs: update template documentation"

          gh api "repos/${OWNER}/${REPO}/git/refs" \
            --method POST \
            -F ref="refs/heads/${BRANCH}" \
            -F sha="${GITHUB_SHA}"

          while IFS= read -r file; do
            existing_sha=$(gh api "repos/${OWNER}/${REPO}/contents/${file}?ref=${BRANCH}" \
              --jq '.sha' 2>/dev/null || true)
            args=(
              --method PUT
              -F message="${MESSAGE} [skip ci]"
              -F content="$(base64 -w0 "$file")"
              -F branch="${BRANCH}"
            )
            [ -n "$existing_sha" ] && args+=(-F sha="$existing_sha")
            gh api "repos/${OWNER}/${REPO}/contents/${file}" "${args[@]}"
          done <<< "$changed"

          gh pr create \
            --title "${MESSAGE}" \
            --body "${MESSAGE}" \
            --head "${BRANCH}" \
            --base main
