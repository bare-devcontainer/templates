name: "Test Dev Container Templates"

permissions: {}

on:
  pull_request:
    paths:
      - 'src/**'
      - '.github/workflows/test.yml'
  workflow_dispatch:

jobs:
  discover:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      templates: ${{ steps.list.outputs.templates }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: List templates
        id: list
        run: |
          templates=$(find src -mindepth 1 -maxdepth 1 -type d -printf '%f\n' | sort | jq -R . | jq -sc .)
          echo "templates=${templates}" >> "$GITHUB_OUTPUT"

  verify:
    needs: discover
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        template: ${{ fromJson(needs.discover.outputs.templates) }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22

      - name: Install devcontainer CLI
        run: |
          # renovate: datasource=npm depName=@devcontainers/cli
          npm install -g @devcontainers/cli@0.87.0

      - name: Apply default template options
        id: apply
        run: |
          set -e
          workdir="$(mktemp -d)"
          cp -R "src/${{ matrix.template }}/." "${workdir}"

          cd "${workdir}"
          for option in $(jq -r '.options // {} | keys[]' devcontainer-template.json); do
            default=$(jq -r ".options.${option}.default" devcontainer-template.json)
            if [ -z "${default}" ] || [ "${default}" = "null" ]; then
              echo "Template '${{ matrix.template }}' is missing a default value for option '${option}'"
              exit 1
            fi
            escaped=$(printf '%s' "${default}" | sed -e 's/[\/&]/\\&/g')
            find . -type f -exec sed -i "s/\${templateOption:${option}}/${escaped}/g" {} +
          done

          echo "workdir=${workdir}" >> "$GITHUB_OUTPUT"

      - name: Build and start container
        run: |
          devcontainer up --id-label "test-container=${{ matrix.template }}" --workspace-folder "${{ steps.apply.outputs.workdir }}"

      - name: Verify container is usable
        run: |
          devcontainer exec --id-label "test-container=${{ matrix.template }}" --workspace-folder "${{ steps.apply.outputs.workdir }}" echo ok
