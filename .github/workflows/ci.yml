name: CI

permissions: {}

on:
  pull_request:
    paths:
      - 'src/**'
      - 'test/**'
      - '.decolint.jsonc'
      - '.github/workflows/ci.yml'
  workflow_dispatch:

jobs:
  description-length:
    runs-on: ubuntu-slim
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Check description length (max 88 chars)
        run: |
          failed=0
          while IFS= read -r file; do
            desc=$(jq -r '.description' "$file")
            len=${#desc}
            if [[ $len -gt 88 ]]; then
              echo "FAIL ($len chars): $file"
              echo "  $desc"
              failed=1
            fi
          done < <(find src -name devcontainer-template.json | sort)
          exit $failed

  decolint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    env:
      # renovate: datasource=docker depName=ghcr.io/bare-devcontainer/decolint
      DECOLINT_IMAGE: "ghcr.io/bare-devcontainer/decolint:0.2.0@sha256:a3c563be09aaa362438adc39bac01323a4abc98d587663f5a8d8fa504b6775d4"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run decolint on each template
        run: |
          failed=0
          for dir in src/*/; do
            echo "::group::decolint ${dir}"
            docker run --rm -v "${PWD}:/workspace" -w /workspace \
              "${DECOLINT_IMAGE}" --format=github "${dir}" || failed=1
            echo "::endgroup::"
          done
          exit "${failed}"

  discover:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      matrix: ${{ steps.list.outputs.matrix }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: List templates, imageVariant and arch combinations
        id: list
        run: |
          matrix=$(
            find src -mindepth 1 -maxdepth 1 -type d -printf '%f\n' | sort | while read -r template; do
              jq -c --arg t "$template" '
                (.options.imageVariant.proposals // [.options.imageVariant.default])[] as $variant |
                ("amd64", "arm64") as $arch |
                {template: $t, imageVariant: $variant, arch: $arch}
              ' "src/${template}/devcontainer-template.json"
            done | jq -sc .
          )
          echo "matrix=${matrix}" >> "$GITHUB_OUTPUT"

  verify:
    needs: discover
    runs-on: ${{ matrix.arch == 'arm64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    timeout-minutes: 15
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.discover.outputs.matrix) }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          # renovate: datasource=node depName=node
          node-version: "26.5.0"

      - name: Install devcontainer CLI
        run: |
          # renovate: datasource=npm depName=@devcontainers/cli
          npm install -g @devcontainers/cli@0.87.0

      - name: Apply template options
        id: apply
        run: |
          set -e
          workdir="$(mktemp -d)"
          cp -R "src/${{ matrix.template }}/." "${workdir}"

          mkdir -p "${workdir}/.smoke"
          cp -R "test/_global" "test/${{ matrix.template }}" "${workdir}/.smoke/"

          cd "${workdir}"
          escaped=$(printf '%s' "${{ matrix.imageVariant }}" | sed -e 's/[\/&]/\\&/g')
          find . -type f -exec sed -i "s/\${templateOption:imageVariant}/${escaped}/g" {} +

          echo "workdir=${workdir}" >> "$GITHUB_OUTPUT"

      - name: Build and start container
        run: |
          devcontainer up --id-label "test-container=${{ matrix.template }}" --workspace-folder "${{ steps.apply.outputs.workdir }}"

      - name: Verify container architecture
        run: |
          set -eu
          case "${{ matrix.arch }}" in
            amd64) expected="x86_64" ;;
            arm64) expected="aarch64" ;;
            *) echo "Unknown arch: ${{ matrix.arch }}" >&2; exit 1 ;;
          esac
          actual="$(devcontainer exec --id-label "test-container=${{ matrix.template }}" --workspace-folder "${{ steps.apply.outputs.workdir }}" uname -m)"
          echo "expected=${expected} actual=${actual}"
          test "${actual}" = "${expected}"

      - name: Verify container security settings
        run: |
          set -eu
          cid="$(docker ps -q --filter "label=test-container=${{ matrix.template }}")"
          test -n "${cid}"
          test "$(echo "${cid}" | wc -l)" -eq 1
          docker inspect --format '{{json .HostConfig.CapDrop}} {{json .HostConfig.SecurityOpt}} {{.HostConfig.Init}}' "${cid}"
          docker inspect "${cid}" | jq -e '
            .[0].HostConfig
            | (.CapDrop | index("ALL"))
              and (.SecurityOpt | index("no-new-privileges"))
              and (.Init == true)
          '

      - name: Run smoke test
        run: |
          devcontainer exec --id-label "test-container=${{ matrix.template }}" --workspace-folder "${{ steps.apply.outputs.workdir }}" sh ".smoke/${{ matrix.template }}/test.sh"
